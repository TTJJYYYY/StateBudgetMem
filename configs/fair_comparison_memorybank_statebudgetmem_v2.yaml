# Unified fair comparison after the 2026-07-18 minimal view/routing fixes.
# This run remains fully local: no cloud API and no local LLM answerer.
dataset_path: data/controlled/temporal_challenge_v1.jsonl
results_dir: results/fair_comparison_v2
methods:
  - memorybank_core
  - memorybank_versioning
  - memorybank_dual_views
  - statebudgetmem_rule
  - statebudgetmem_oracle
top_k: 3
candidate_k: 20
token_budget: 256
random_seed: 42
repeat: 1
embedding_backend: sentence-transformers
embedding_model: sentence-transformers/all-MiniLM-L6-v2
forgetting_enabled: true
forgetting_threshold: 0.3
exclude_forgotten: false
reinforcement_enabled: false
query_state_policy: independent
token_counter_name: memory_record_token_cost
